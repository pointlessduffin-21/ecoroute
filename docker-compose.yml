services:
  # ─── PostgreSQL + PostGIS ────────────────────────────────────────────────────
  postgres:
    image: postgis/postgis:16-3.4
    platform: linux/amd64
    container_name: ecoroute-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ecoroute
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ecoroute_dev}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Redis ───────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: ecoroute-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Backend API (Bun + HonoJS) ─────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ecoroute-backend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD:-ecoroute_dev}@postgres:5432/ecoroute
      REDIS_URL: redis://redis:6379
      MQTT_BROKER_URL: ${MQTT_BROKER_URL:-mqtt://109.123.238.215:1883}
      ORS_API_KEY: ${ORS_API_KEY:-}
      JWT_SECRET: ${JWT_SECRET:-ecoroute-dev-jwt-secret-2026}
      DEVICE_API_KEY: ${DEVICE_API_KEY:-ecoroute-device-key-change-in-production}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      AI_SERVICE_URL: http://ai-service:8000
      NODE_ENV: ${NODE_ENV:-development}
      PORT: 3000
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ─── AI Service (Python + FastAPI) ──────────────────────────────────────────
  ai-service:
    build:
      context: ./ai-service
      dockerfile: Dockerfile
    container_name: ecoroute-ai-service
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD:-ecoroute_dev}@postgres:5432/ecoroute
      ORS_API_KEY: ${ORS_API_KEY:-}
    volumes:
      - ai_models:/app/models
    depends_on:
      postgres:
        condition: service_healthy

  # ─── Frontend (React + Nginx) ──────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: ecoroute-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  ai_models:
