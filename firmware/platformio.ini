[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
upload_port = /dev/cu.usbserial-562B0100951
monitor_port = /dev/cu.usbserial-562B0100951
board_build.partitions = huge_app.csv
lib_deps =
    bblanchon/ArduinoJson@^7.0.0
    knolleary/PubSubClient@^2.8.0
build_flags =
    -DCORE_DEBUG_LEVEL=3
    -DBOARD_HAS_PSRAM=0

; MQTT simulator — simulated telemetry only, no sensors/BLE
[env:simulator]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
upload_port = /dev/cu.usbserial-562B0100951
monitor_port = /dev/cu.usbserial-562B0100951
src_dir = EcoRouteBin
board_build.partitions = huge_app.csv
lib_deps =
    bblanchon/ArduinoJson@^7.0.0
    knolleary/PubSubClient@^2.8.0
build_flags =
    -DCORE_DEBUG_LEVEL=3
